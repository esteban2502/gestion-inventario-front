<div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-2 mb-3">
  <h2 class="page-title">Categorias</h2>
  <button class="btn btn-primary" (click)="goToCreate()">
    <i class="bi bi-plus-lg me-1"></i> Nueva categoria
  </button>
</div>

@if (loading) {
  <app-spinner></app-spinner>
} @else {
  <div class="card">
    <div class="table-responsive">
      <table class="table table-hover mb-0">
        <thead>
          <tr>
            <th>Nombre</th>
            <th>Descripcion</th>
            <th class="text-end">Acciones</th>
          </tr>
        </thead>
        <tbody>
          @for (category of paginatedCategories; track category.id) {
            <tr>
              <td>{{ category.name }}</td>
              <td>{{ category.description }}</td>
              <td class="action-cell">
                <div class="action-buttons">
                  <button class="btn btn-sm btn-outline-primary" (click)="goToEdit(category.id)">
                    <i class="bi bi-pencil"></i>
                  </button>
                  <button class="btn btn-sm btn-outline-danger" (click)="onDelete(category)">
                    <i class="bi bi-trash"></i>
                  </button>
                </div>
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>
    <div class="card-footer bg-white border-0 d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-2">
      <small class="text-muted">
        Mostrando {{ pageStart }} a {{ pageEnd }} de {{ categories.length }} registros
      </small>
      <div class="d-flex align-items-center gap-2">
        <label class="small text-muted">Por pagina</label>
        <select class="form-select form-select-sm" style="width: auto;" [(ngModel)]="pageSize" (change)="onPageSizeChange()">
          @for (size of pageSizeOptions; track size) {
            <option [ngValue]="size">{{ size }}</option>
          }
        </select>
        <button class="btn btn-sm btn-outline-secondary" (click)="goToPrevPage()" [disabled]="currentPage === 1">
          Anterior
        </button>
        <span class="small text-muted">{{ currentPage }} / {{ totalPages }}</span>
        <button class="btn btn-sm btn-outline-secondary" (click)="goToNextPage()" [disabled]="currentPage === totalPages">
          Siguiente
        </button>
      </div>
    </div>
  </div>
}

<app-confirm-modal
  [isOpen]="!!categoryPendingDelete"
  title="Eliminar categoria"
  [message]="'Se eliminara la categoria ' + (categoryPendingDelete?.name || '') + '. Esta accion no se puede deshacer.'"
  confirmText="Eliminar"
  cancelText="Cancelar"
  (cancel)="cancelDelete()"
  (confirm)="confirmDelete()"
></app-confirm-modal>
