<h2 class="page-title mb-3">{{ isEditMode ? 'Editar categoria' : 'Nueva categoria' }}</h2>

@if (loading) {
  <app-spinner></app-spinner>
} @else {
  <div class="card">
    <div class="card-body">
      <form [formGroup]="form" (ngSubmit)="save()">
        <div class="row g-3">
          <div class="col-12">
            <label class="form-label">Nombre</label>
            <input
              class="form-control"
              type="text"
              formControlName="name"
              placeholder="Ej: Electronica"
              maxlength="100"
              pattern="^[A-Za-zÀ-ÿ0-9][A-Za-zÀ-ÿ0-9\s.,\-()]{2,99}$"
            />
          </div>
          <div class="col-12">
            <label class="form-label">Descripcion</label>
            <textarea
              class="form-control"
              rows="3"
              formControlName="description"
              placeholder="Ej: Productos de tecnologia y accesorios"
              maxlength="300"
              pattern="^$|^[A-Za-zÀ-ÿ0-9\s.,\-()]{3,300}$"
            ></textarea>
          </div>
        </div>

        <div class="d-flex gap-2 mt-4">
          <button class="btn btn-primary" type="submit" [disabled]="submitting">
            @if (submitting) {
              <span class="spinner-border spinner-border-sm me-1"></span>
            }
            Guardar
          </button>
          <button class="btn btn-outline-secondary" type="button" (click)="cancel()">Cancelar</button>
        </div>
      </form>
    </div>
  </div>
}
