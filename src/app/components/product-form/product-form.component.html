<h2 class="page-title mb-3">{{ isEditMode ? 'Editar producto' : 'Nuevo producto' }}</h2>

@if (loading) {
  <app-spinner></app-spinner>
} @else {
  <div class="card">
    <div class="card-body">
      <form [formGroup]="form" (ngSubmit)="save()">
        <div class="row g-3">
          <div class="col-12">
            <label class="form-label">Nombre</label>
            <input
              class="form-control"
              type="text"
              formControlName="name"
              placeholder="Ej: Auriculares Bluetooth"
              maxlength="100"
              pattern="^[A-Za-zÀ-ÿ0-9][A-Za-zÀ-ÿ0-9\s.,\-()]{2,99}$"
            />
          </div>

          <div class="col-12">
            <label class="form-label">Descripcion</label>
            <textarea
              class="form-control"
              rows="3"
              formControlName="description"
              placeholder="Ej: Producto con garantia oficial"
              maxlength="300"
              pattern="^$|^[A-Za-zÀ-ÿ0-9\s.,\-()]{3,300}$"
            ></textarea>
          </div>

          <div class="col-12 col-md-6">
            <label class="form-label">Precio</label>
            <input
              class="form-control"
              type="number"
              step="0.01"
              min="0.01"
              formControlName="price"
              placeholder="Ej: 19999.99"
            />
          </div>

          <div class="col-12 col-md-6">
            <label class="form-label">Stock</label>
            <input
              class="form-control"
              type="number"
              min="0"
              step="1"
              formControlName="stock"
              placeholder="Ej: 50"
            />
          </div>

          <div class="col-12">
            <label class="form-label">Categoria</label>
            <select class="form-select" formControlName="categoryId">
              <option value="0">Seleccionar categoria</option>
              @for (category of categories; track category.id) {
                <option [value]="category.id">{{ category.name }}</option>
              }
            </select>
          </div>
        </div>

        <div class="d-flex gap-2 mt-4">
          <button class="btn btn-primary" type="submit" [disabled]="submitting">
            @if (submitting) {
              <span class="spinner-border spinner-border-sm me-1"></span>
            }
            Guardar
          </button>
          <button class="btn btn-outline-secondary" type="button" (click)="cancel()">Cancelar</button>
        </div>
      </form>
    </div>
  </div>
}
